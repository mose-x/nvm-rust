name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          echo "  Static liblzma via lzma-sys static feature"

      - name: Install musl toolchain (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.x86_64-unknown-linux-musl]
          linker = "musl-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]
          EOF
          echo "  Static musl build (fully static binary for Alpine/distroless)"

      - name: Build (static link)
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          LZMA_API_STATIC: "1"
          PKG_CONFIG_ALL_STATIC: "1"
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Build (default)
        if: matrix.target != 'aarch64-unknown-linux-gnu' && matrix.target != 'x86_64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf nvm-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release nvm

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/nvm.exe -DestinationPath nvm-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvm-${{ matrix.target }}
          path: nvm-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for f in */nvm-*.*; do
            dirname=$(dirname "$f")
            mv "$f" .
          done
          sha256sum nvm-*.* > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nvm-*.tar.gz
            nvm-*.zip
            sha256sums.txt
          generate_release_notes: true
